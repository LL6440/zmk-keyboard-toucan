description: |
  Circular gesture scroll input processor.

  Detects circular motion on a relative trackpad and converts it to
  scroll events, without any layer restriction.

  The processor runs a two-phase direction detection:
    - Phase 1: accumulate movement direction over `detect-samples` events.
    - Phase 2: accumulate the next `detect-samples` events.
  If the angle between the two vectors is greater than ~60°, the motion
  is classified as circular and scroll mode is locked.

  The scroll axis is determined by the dominant direction of phase 1:
    - Phase 1 mostly vertical   → vertical scroll
    - Phase 1 mostly horizontal → horizontal scroll
    - Straight / diagonal       → pointer (pass-through)

  For vertical scroll:
    - Clockwise rotation  → positive INPUT_REL_WHEEL value
    - Counter-clockwise   → negative INPUT_REL_WHEEL value
  Use `invert-vertical: true` to flip if your system expects the opposite.

  Likewise for horizontal scroll with INPUT_REL_HWHEEL and
  `invert-horizontal`.

compatible: "zmk,input-processor-circular-scroll"

include: base.yaml

properties:
  "#input-processor-cells":
    type: int
    required: true
    const: 0
    description: No runtime parameters — all tuning is via DTS properties.

  detect-samples:
    type: int
    default: 6
    description: |
      Number of relative XY events accumulated in each detection phase.
      Total detection window = 2 × detect-samples events before the mode
      is locked.  At ~100 events/s that is ~120 ms for the default of 6.
      Increase for stricter gesture recognition; decrease for faster
      response.

  scroll-divisor:
    type: int
    default: 419
    description: |
      Controls how many scroll ticks are emitted per full revolution.
      Formula: ticks_per_revolution ≈ 6280 / scroll-divisor
        419  → ~15 ticks/revolution  (default)
        628  → ~10 ticks/revolution  (slower)
        314  → ~20 ticks/revolution  (faster)
      The threshold is computed as: r² × scroll-divisor / 1000,
      where r is the approximate radius (in relative units) at the
      moment the mode is locked.

  touch-timeout-ms:
    type: int
    default: 200
    description: |
      If no relative events are received for this many milliseconds the
      processor resets and treats the next event as a new touch.  This
      covers Cirque drivers that do not emit explicit BTN_TOUCH events.

  invert-vertical:
    type: boolean
    description: |
      Invert the sign of emitted INPUT_REL_WHEEL values.
      Use when clockwise rotation scrolls in the wrong direction.

  invert-horizontal:
    type: boolean
    description: |
      Invert the sign of emitted INPUT_REL_HWHEEL values.
      Use when clockwise rotation scrolls in the wrong direction.
