description: |
  Circular gesture scroll input processor for ZMK.

  Detects circular motion on a trackpad using angular momentum and
  converts it to WHEEL / HWHEEL events on all layers.

  After detection the processor estimates the circle centre via an
  exponential moving average of the finger position, and computes
  the tangential component relative to that centre. This ensures
  scroll direction stays consistent throughout the full revolution,
  regardless of where on the trackpad the gesture starts.

compatible: "zmk,input-processor-circular-scroll"

include: base.yaml

properties:
  "#input-processor-cells":
    type: int
    required: true
    const: 0

  track-remainders:
    type: boolean
    description: |
      Required by ZMK's input_listener to generate DT macros.
      Leave unset — the processor manages its own accumulator.

  detect-samples:
    type: int
    default: 15
    description: |
      Y-events to observe before classifying the gesture (~150 ms at 100 Hz).

  tang-threshold:
    type: int
    default: 200
    description: |
      Minimum |angular momentum| to classify as circular motion.
      Lower = triggers more easily. Higher = requires a more deliberate circle.

  scroll-divisor:
    type: int
    default: 419
    description: |
      Ticks per revolution ~= 2*pi*1000 / scroll-divisor
        419 -> ~15 ticks/rev  (default)
        628 -> ~10 ticks/rev  (slower)
        314 -> ~20 ticks/rev  (faster)

  touch-timeout-ms:
    type: int
    default: 200
    description: |
      Inactivity timeout (ms) in DETECT / POINTER mode.

  scroll-lock-timeout-ms:
    type: int
    default: 500
    description: |
      Inactivity timeout (ms) when scroll mode is locked.
      Long enough to survive a pause in circular motion,
      short enough to detect a genuine finger lift.

  invert-vertical:
    type: boolean
    description: Invert INPUT_REL_WHEEL sign.

  invert-horizontal:
    type: boolean
    description: Invert INPUT_REL_HWHEEL sign.
