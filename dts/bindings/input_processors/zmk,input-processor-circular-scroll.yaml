# SPDX-License-Identifier: MIT

description: Circular scroll gesture processor for absolute trackpads

compatible: "zmk,input-processor-circular-scroll"

include: ip_zero_param.yaml

properties:
  pressure-threshold:
    type: int
    default: 8
    description: Minimum ABS_Z value considered an active touch.

  x-max:
    type: int
    default: 2047
    description: Maximum X coordinate expected from the trackpad.

  y-max:
    type: int
    default: 1535
    description: Maximum Y coordinate expected from the trackpad.

  inner-ring-pct:
    type: int
    default: 72
    description: Minimum radius as a percent of half the smallest pad dimension required to start a gesture.

  sector-half-angle-deg:
    type: int
    default: 30
    description: Half-width of the allowed start sectors around 3h and 6h in degrees.

  activation-angle-deg:
    type: int
    default: 10
    description: Signed accumulated angular motion required before the gesture captures the touch.

  scroll-angle-deg:
    type: int
    default: 12
    description: Signed accumulated angular motion that produces one wheel step after capture.

  invert-vertical:
    type: boolean
    description: Invert vertical wheel output.

  invert-horizontal:
    type: boolean
    description: Invert horizontal wheel output.
