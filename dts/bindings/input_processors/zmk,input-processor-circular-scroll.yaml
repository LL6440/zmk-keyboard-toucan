description: |
  Circular gesture scroll input processor for ZMK.

  Detects circular motion on a trackpad using angular momentum and
  converts it to WHEEL / HWHEEL events, without any layer restriction.

  During detection (detect-samples Y-events) the processor accumulates:
    tang += cum_x * dy - cum_y * dx   (angular momentum)
  If |tang| >= tang-threshold the motion is circular and scroll is locked.
  The scroll axis is determined by the dominant direction of accumulated
  movement (sum_dy vs sum_dx).

compatible: "zmk,input-processor-circular-scroll"

include: base.yaml

properties:
  "#input-processor-cells":
    type: int
    required: true
    const: 0

  track-remainders:
    type: boolean
    description: |
      Required by ZMK's input_listener to generate DT macros.
      Leave unset (false) — the processor tracks its own accumulator.

  detect-samples:
    type: int
    default: 15
    description: |
      Number of Y-events to observe before classifying the gesture.
      At 100 Hz: 15 events ~= 150 ms.  Increase for slower, more
      deliberate gestures; decrease for faster response.

  tang-threshold:
    type: int
    default: 200
    description: |
      Minimum absolute angular momentum to classify as circular motion.
      tang = sum(cum_x * dy - cum_y * dx) over detect-samples events.
      For r=40, v=3 units/event, 15 events: tang ~= 1760 for a circle
      and ~= 0 for a straight line.  Lower values trigger more easily;
      higher values require a more pronounced circle.

  scroll-divisor:
    type: int
    default: 419
    description: |
      Controls scroll sensitivity after mode is locked.
      scroll_threshold = r_sq * scroll-divisor / 1000
      Ticks per revolution ~= 2*pi*1000 / scroll-divisor
        419 -> ~15 ticks/rev  (default)
        628 -> ~10 ticks/rev  (slower)
        314 -> ~20 ticks/rev  (faster)

  touch-timeout-ms:
    type: int
    default: 200
    description: |
      Inactivity timeout in ms. If no REL events arrive for this long,
      the processor resets and treats the next event as a new touch.
      Covers Cirque drivers that do not emit explicit BTN_TOUCH events.

  invert-vertical:
    type: boolean
    description: Invert INPUT_REL_WHEEL sign (flip CW scroll direction).

  invert-horizontal:
    type: boolean
    description: Invert INPUT_REL_HWHEEL sign (flip CW scroll direction).
