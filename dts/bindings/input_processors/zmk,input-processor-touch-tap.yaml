description: |
  Software tap detector for Cirque absolute touchpads.

compatible: "zmk,input-processor-touch-tap"

include: ip_zero_param.yaml

properties:
  pressure-threshold:
    type: int
    required: true
    description: Minimum ABS_Z value considered an active touch.
  max-tap-ms:
    type: int
    required: false
    default: 180
    description: Maximum touch duration to still count as a tap.
  move-threshold:
    type: int
    required: false
    default: 28
    description: Maximum per-axis ABS travel allowed for a tap gesture.
